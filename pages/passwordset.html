<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about</title>
  </head>
  <body>
    <%- include('./layout/header'); -%>

    <!-- main -->
    <main class="main">
      <!-- 水平排列的分頁nav-tabs -->
      <!-- <nav class="header"></nav> -->
      <section class="content">
        <h3 class="mb-5">密碼設定</h3>
        <form class="row">
          <div class="col-12 mb-3">
            <label for="InputName" class="form-label">舊密碼<span class="rIcon">*</span></label>
            <input type="password" class="form-control border border-1" id="InputName" name="name" placeholder="password" required>
          </div>
          <div class="col-12 mb-3">
            <label for="InputName2" class="form-label">新密碼<span class="rIcon">*</span></label>
            <input type="password" class="form-control border border-1" id="InputName2" name="name" placeholder="new password" required>
          </div>
          <div class="col-12 mb-3">
            <label for="InputName3" class="form-label">再次輸入新密碼<span class="rIcon">*</span></label>
            <input type="password" class="form-control border border-1" id="InputName3" name="name" placeholder="try again new password" required>
          </div>
          <div class="col-12 mb-3">
            <button type="button" class="btn btn-outline-dark mb-3">取消</button>
            <button type="submit" class="btn btn-dark mb-3">儲存</button>
          </div>
        </form>
      </section>
    </main>

    
   
    

    <script type="module" src="../main.js"></script>
   
  </body>
</html>
