<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about</title>
  </head>
  <body>
    <%- include('./layout/header'); -%>
    
    <!-- main -->
    <main class="main">
      <!-- 水平排列的分頁nav-tabs -->
      <nav class="header">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button" role="tab" aria-controls="home" aria-selected="true">我的收藏</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab" aria-controls="profile" aria-selected="false">我的評分</button>
          </li>
        </ul>
      </nav>
      <section class="content">
        <!-- 我的收藏 -->
        <div class="tab-content" id="myTabContent">
          <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
            <p>content</p>
          </div>
          <!-- 我的評分 -->
          <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab">
            <div class="card border-primary mb-3"> <!----style="max-width: 18rem;"-->
              <div class="card-header d-flex justify-content-between">
                <!-- 日期 -->
                <div class="expoDate">2024/9/15 - 2024/11/15</div>
                <!-- 縣市 -->
                <ul class="addressMap d-flex">
                  <li><i class="me-2">Map</i></li>
                  <li>台北市</li>
                </ul>
             </div>
              <div class="card-body text-primary d-flex ">
                <figure class="rounded">
                  <img src="/assets/images/cat.jpg" alt="郁金香" style="width:300px">
                </figure>
                <div class="d-flex flex-column">
                  <h5 class="card-title">吉依卡哇ChiikawaPOP UP IN 台北...</h5>
                  <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
                  <div class="d-flex">
                    <button class="button rounded-pill" type="button">#攝影展</button>
                    <button class="button rounded-pill" type="button">#光影藝術</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    
   
    

    <script type="module" src="../main.js"></script>
   
  </body>
</html>
